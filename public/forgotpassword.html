<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Reset</title>
  <link rel="stylesheet" href="./css/forgotpassword.css">
</head>
<body>
  <div class="container">
    <!-- resetbox block -->
    <div class="box glass left" id="resetBox">
      <h2>Reset Password</h2>
      
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="Enter your full name" required>
      
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
      
      <label for="captchaInput">Captcha</label>
      <div class="captcha-container">
        <span id="captchaText"></span>
        <button type="button" id="refreshCaptcha">↻</button>
      </div>
      <input type="text" id="captchaInput" placeholder="Enter captcha" required>

      <button id="sendLinkBtn">Send Reset Link</button>
      <p id="resetError" class="error-msg"></p>
    </div>

    <!-- New Password block-->
    <div class="box glass right" id="newPassBox" style="display:none;">
      <h2>Set New Password</h2>
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" required>
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
      <button id="submitBtn">Submit</button>
      <p id="newPassError" class="error-msg"></p>
    </div>
  </div>

  <script type="module" src="./js/forgotpassword.js"></script>
</body>
</html>
